name: bento_labs
description: "Build anything you want! The possibilities are endless with BentoLabs"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <5.0.0'

dependencies:
  api_client:
    path: packages/api_client
  app_core:
    path: packages/app_core
  app_ui:
    path: packages/app_ui
  cached_network_image: ^3.4.1
  credentials_repository:
    path: packages/credentials_repository
  customers_repository:
    path: packages/customers_repository
  addresses_repository:
    path: packages/addresses_repository
  products_repository:
    path: packages/products_repository
  carts_repository:
    path: packages/carts_repository
  cart_items_repository:
    path: packages/cart_items_repository
  orders_repository:
    path: packages/orders_repository
  order_items_repository:
    path: packages/order_items_repository
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  go_router: ^17.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.2
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  very_good_analysis: ^10.0.0
  bloc_lint: ^0.3.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/